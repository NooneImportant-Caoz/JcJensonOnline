<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JcJensonOnline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:#07070f;touch-action:none;}
    #gameCanvas{display:block;position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges;}

    /* Mobile HUD — only on touch devices */
    #mobileHud{position:fixed;inset:0;pointer-events:none;z-index:100;}

    /* D-pad bottom-left, safe area aware */
    #dpad{
      position:absolute;
      bottom:max(28px,env(safe-area-inset-bottom,28px));
      left:max(20px,env(safe-area-inset-left,20px));
      width:132px;height:132px;
      pointer-events:all;
    }
    .dpad-btn{
      position:absolute;width:44px;height:44px;
      background:rgba(0,255,231,0.12);
      border:1.5px solid rgba(0,255,231,0.35);
      border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      color:rgba(0,255,231,0.85);font-size:20px;
      user-select:none;cursor:pointer;
    }
    .dpad-btn.pressed{background:rgba(0,255,231,0.3);}
    #dbUp   {top:0;   left:44px;}
    #dbDown {bottom:0;left:44px;}
    #dbLeft {top:44px;left:0;}
    #dbRight{top:44px;right:0;}

    /* Action buttons bottom-right */
    #actionBtns{
      position:absolute;
      bottom:max(28px,env(safe-area-inset-bottom,28px));
      right:max(16px,env(safe-area-inset-right,16px));
      display:flex;flex-direction:column;gap:10px;
      pointer-events:all;
    }
    .act-btn{
      width:56px;height:56px;
      background:rgba(10,10,20,0.8);
      border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Orbitron',sans-serif;font-size:0.52rem;
      letter-spacing:0.08em;user-select:none;cursor:pointer;
      flex-direction:column;gap:3px;
    }
    .act-btn .icon{font-size:22px;line-height:1;}
    #btnChat  {border:1.5px solid rgba(0,255,231,0.45);color:rgba(0,255,231,0.9);}
    #btnChat.active{background:rgba(0,255,231,0.2);}
    #btnLogout{border:1.5px solid rgba(255,79,123,0.45);color:rgba(255,79,123,0.9);}

    /* Hidden keyboard trigger */
    #mobileChatInput{
      position:fixed;bottom:-200px;left:0;width:100%;
      opacity:0;pointer-events:none;font-size:16px;
    }

    /* Hide on desktop */
    @media(hover:hover) and (pointer:fine){#mobileHud{display:none;}}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="mobileHud">
    <div id="dpad">
      <div class="dpad-btn" id="dbUp">▲</div>
      <div class="dpad-btn" id="dbLeft">◀</div>
      <div class="dpad-btn" id="dbRight">▶</div>
      <div class="dpad-btn" id="dbDown">▼</div>
    </div>
    <div id="actionBtns">
      <div class="act-btn" id="btnChat"><span class="icon">💬</span>CHAT</div>
      <div class="act-btn" id="btnLogout"><span class="icon">⏏</span>EXIT</div>
    </div>
  </div>
  <input id="mobileChatInput" type="text" maxlength="80" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
